name: Validate Operations

on:
  pull_request:
    paths: ['workflows/**', 'infrastructure/**']

jobs:
  validate-workflows:
    name: Validate n8n Workflows
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all workflow JSON files
        run: |
          echo "Validating JSON syntax for all workflows..."
          find workflows/ -name "*.json" | while read f; do
            echo "Checking $f..."
            jq empty "$f" && echo "  ✅ OK" || { echo "  ❌ INVALID JSON"; exit 1; }
          done

  validate-kubernetes:
    name: Validate Kubernetes Manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          wget https://github.com/yannh/kubeconform/releases/download/v0.6.4/kubeconform-linux-amd64.tar.gz
          tar xf kubeconform-linux-amd64.tar.gz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate YAML resources
        run: |
          echo "Validating Kubernetes manifests..."
          kubectl kustomize infrastructure/kubernetes/overlays/dev/ | kubeconform -strict -summary -
          kubectl kustomize infrastructure/kubernetes/overlays/staging/ | kubeconform -strict -summary -
          kubectl kustomize infrastructure/kubernetes/overlays/prod/ | kubeconform -strict -summary -
          
          echo "Verifying prod namespaces..."
          NAMESPACES=$(kubectl kustomize infrastructure/kubernetes/overlays/prod/ | grep -E "^  namespace: " | sed 's/  namespace: //' | sort -u)
          EXPECTED="prod-app prod-data prod-gateway prod-observability prod-security"
          if [ "$(echo $NAMESPACES | xargs)" != "$EXPECTED" ]; then
            echo "Namespace validation failed! Got: $NAMESPACES"
            exit 1
          fi
          echo "Prod namespaces validated successfully."
