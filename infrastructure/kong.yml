_format_version: "3.0"
services:
  - name: nginx-proxy
    url: http://nginx:80
    routes:
      - name: diffusion-webhook
        paths:
          - /webhook/
        strip_path: false
    plugins:
      - name: jwt
        config:
          claims_to_verify:
            - exp

# Déclaration du premier client (Tenant)
consumers:
  - username: client_demo_01

jwt_secrets:
  - consumer: client_demo_01
    key: "emetteur_demo_01"          # Identifiant 'iss' dans le JWT
    secret: "Cl3_S3cr3t3_B1ind3e_2026_SUPER_SECRET_KEY!" # Clé de signature privée
    algorithm: HS256