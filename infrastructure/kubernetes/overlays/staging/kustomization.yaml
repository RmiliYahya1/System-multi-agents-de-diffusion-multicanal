apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: staging-

resources:
  - ../../base

patches:
  - path: patches/prometheus-config-staging.yaml
    target:
      version: v1
      kind: ConfigMap
      name: prometheus-config
  - path: patches/ingress-host-staging.yaml
    target:
      kind: Ingress
      name: diffusion-ingress
  - target:
      namespace: data
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: staging-data
  - target:
      namespace: app
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: staging-app
  - target:
      namespace: gateway
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: staging-gateway
  - target:
      namespace: observability
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: staging-observability
  - target:
      namespace: security
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: staging-security
  - target:
      namespace: external-secrets
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: staging-external-secrets
  - target:
      kind: Namespace
      name: data
    patch: |-
      - op: replace
        path: /metadata/name
        value: staging-data
  - target:
      kind: Namespace
      name: app
    patch: |-
      - op: replace
        path: /metadata/name
        value: staging-app
  - target:
      kind: Namespace
      name: gateway
    patch: |-
      - op: replace
        path: /metadata/name
        value: staging-gateway
  - target:
      kind: Namespace
      name: observability
    patch: |-
      - op: replace
        path: /metadata/name
        value: staging-observability
  - target:
      kind: Namespace
      name: security
    patch: |-
      - op: replace
        path: /metadata/name
        value: staging-security
  - target:
      kind: Namespace
      name: external-secrets
    patch: |-
      - op: replace
        path: /metadata/name
        value: staging-external-secrets
  - target:
      kind: Service
      name: postgres
      namespace: app
    patch: |-
      - op: replace
        path: /spec/externalName
        value: postgres.staging-data.svc.cluster.local
  - target:
      kind: Service
      name: redis
      namespace: app
    patch: |-
      - op: replace
        path: /spec/externalName
        value: redis.staging-data.svc.cluster.local
  - target:
      kind: Service
      name: n8n-main
      namespace: gateway
    patch: |-
      - op: replace
        path: /spec/externalName
        value: n8n-main.staging-app.svc.cluster.local
  - target:
      kind: Service
      name: postgres-exporter
      namespace: observability
    patch: |-
      - op: replace
        path: /spec/externalName
        value: postgres.staging-data.svc.cluster.local
  - target:
      kind: Service
      name: redis-exporter
      namespace: observability
    patch: |-
      - op: replace
        path: /spec/externalName
        value: redis.staging-data.svc.cluster.local
  - target:
      kind: Service
      name: n8n-main
      namespace: observability
    patch: |-
      - op: replace
        path: /spec/externalName
        value: n8n-main.staging-app.svc.cluster.local
  - target:
      kind: Service
      name: queue-service
      namespace: observability
    patch: |-
      - op: replace
        path: /spec/externalName
        value: queue-service.staging-app.svc.cluster.local

configMapGenerator:
  - name: n8n-config
    behavior: merge
    namespace: app
    literals:
      - LOG_LEVEL=info
      - EXECUTIONS_DATA_MAX_AGE=72
  - name: queue-service-config
    behavior: merge
    namespace: app
    literals:
      - NODE_ENV=staging

generatorOptions:
  disableNameSuffixHash: true

labels:
  - includeSelectors: true
    pairs:
      environment: staging

images:
  - name: n8nio/n8n
    newTag: 2.18.7
  - name: postgres
    newTag: 16.6-alpine
  - name: redis
    newTag: 7.4.1-alpine
  - name: ACCOUNT_ID.dkr.ecr.eu-west-3.amazonaws.com/diffusion-queue-service
    newName: ACCOUNT_ID.dkr.ecr.eu-west-3.amazonaws.com/diffusion-queue-service
    # La CI/CD remplacera staging-<sha> dynamiquement lors du push de l'image
    newTag: staging-latest
  - name: kong
    newTag: 3.6.1
  - name: hashicorp/vault
    newTag: 1.15.6
  - name: prom/prometheus
    newTag: v2.51.0
  - name: grafana/grafana
    newTag: 10.4.18
