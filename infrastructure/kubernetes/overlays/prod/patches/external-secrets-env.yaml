# Patches pour remplacer REPLACE_ENV par "prod" dans les ExternalSecrets
# et configurer l'ARN IRSA du ServiceAccount
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: external-secret-data
  namespace: data
spec:
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: diffusion/prod/database
        property: POSTGRES_PASSWORD
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: diffusion/prod/cache
        property: REDIS_PASSWORD
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: external-secret-pgadmin
  namespace: data
spec:
  data:
    - secretKey: PGADMIN_EMAIL
      remoteRef:
        key: diffusion/prod/pgadmin
        property: PGADMIN_EMAIL
    - secretKey: PGADMIN_PASSWORD
      remoteRef:
        key: diffusion/prod/pgadmin
        property: PGADMIN_PASSWORD
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: external-secret-app
  namespace: app
spec:
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: diffusion/prod/database
        property: POSTGRES_PASSWORD
    - secretKey: REDIS_PASSWORD
      remoteRef:
        key: diffusion/prod/cache
        property: REDIS_PASSWORD
    - secretKey: N8N_ENCRYPTION_KEY
      remoteRef:
        key: diffusion/prod/n8n
        property: N8N_ENCRYPTION_KEY
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: external-secret-gateway
  namespace: gateway
spec:
  data:
    - secretKey: KONG_JWT_SECRET
      remoteRef:
        key: diffusion/prod/gateway
        property: KONG_JWT_SECRET
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: external-secret-grafana
  namespace: observability
spec:
  data:
    - secretKey: GF_ADMIN_PASSWORD
      remoteRef:
        key: diffusion/prod/grafana
        property: GF_ADMIN_PASSWORD
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: external-secret-vault
  namespace: security
spec:
  data:
    - secretKey: VAULT_TOKEN
      remoteRef:
        key: diffusion/prod/vault
        property: VAULT_TOKEN
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: external-secrets
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::ACCOUNT_ID:role/eks-prod-external-secrets
