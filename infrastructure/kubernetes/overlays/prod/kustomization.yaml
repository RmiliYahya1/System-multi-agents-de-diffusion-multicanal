apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namePrefix: prod-

resources:
  - ../../base

patches:
  - path: patches/prometheus-config-prod.yaml
    target:
      version: v1
      kind: ConfigMap
      name: prometheus-config
  - path: patches/ingress-host-prod.yaml
    target:
      kind: Ingress
      name: diffusion-ingress
  - path: patches/increase-replicas.yaml
  - path: patches/storage-class-gp3.yaml
  - path: patches/hpa-prod.yaml
  - path: patches/external-secrets-env.yaml
  - target:
      namespace: data
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: prod-data
  - target:
      namespace: app
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: prod-app
  - target:
      namespace: gateway
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: prod-gateway
  - target:
      namespace: observability
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: prod-observability
  - target:
      namespace: security
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: prod-security
  - target:
      namespace: external-secrets
    patch: |-
      - op: replace
        path: /metadata/namespace
        value: prod-external-secrets
  - target:
      kind: Namespace
      name: data
    patch: |-
      - op: replace
        path: /metadata/name
        value: prod-data
  - target:
      kind: Namespace
      name: app
    patch: |-
      - op: replace
        path: /metadata/name
        value: prod-app
  - target:
      kind: Namespace
      name: gateway
    patch: |-
      - op: replace
        path: /metadata/name
        value: prod-gateway
  - target:
      kind: Namespace
      name: observability
    patch: |-
      - op: replace
        path: /metadata/name
        value: prod-observability
  - target:
      kind: Namespace
      name: security
    patch: |-
      - op: replace
        path: /metadata/name
        value: prod-security
  - target:
      kind: Namespace
      name: external-secrets
    patch: |-
      - op: replace
        path: /metadata/name
        value: prod-external-secrets
  - target:
      kind: Service
      name: postgres
      namespace: app
    patch: |-
      - op: replace
        path: /spec/externalName
        value: postgres.prod-data.svc.cluster.local
  - target:
      kind: Service
      name: redis
      namespace: app
    patch: |-
      - op: replace
        path: /spec/externalName
        value: redis.prod-data.svc.cluster.local
  - target:
      kind: Service
      name: n8n-main
      namespace: gateway
    patch: |-
      - op: replace
        path: /spec/externalName
        value: n8n-main.prod-app.svc.cluster.local
  - target:
      kind: Service
      name: postgres-exporter
      namespace: observability
    patch: |-
      - op: replace
        path: /spec/externalName
        value: postgres.prod-data.svc.cluster.local
  - target:
      kind: Service
      name: redis-exporter
      namespace: observability
    patch: |-
      - op: replace
        path: /spec/externalName
        value: redis.prod-data.svc.cluster.local
  - target:
      kind: Service
      name: n8n-main
      namespace: observability
    patch: |-
      - op: replace
        path: /spec/externalName
        value: n8n-main.prod-app.svc.cluster.local
  - target:
      kind: Service
      name: queue-service
      namespace: observability
    patch: |-
      - op: replace
        path: /spec/externalName
        value: queue-service.prod-app.svc.cluster.local

configMapGenerator:
  - name: n8n-config
    behavior: merge
    namespace: app
    literals:
      - LOG_LEVEL=info
      - EXECUTIONS_DATA_MAX_AGE=168
      - N8N_CONCURRENCY_PRODUCTION_LIMIT=20
  - name: queue-service-config
    behavior: merge
    namespace: app
    literals:
      - NODE_ENV=production

generatorOptions:
  disableNameSuffixHash: true

labels:
  - includeSelectors: true
    pairs:
      environment: prod

images:
  - name: n8nio/n8n
    newTag: 2.18.7
  - name: postgres
    newTag: 16.6-alpine
  - name: redis
    newTag: 7.4.1-alpine
  - name: ACCOUNT_ID.dkr.ecr.eu-west-3.amazonaws.com/diffusion-queue-service
    newName: ACCOUNT_ID.dkr.ecr.eu-west-3.amazonaws.com/diffusion-queue-service
    newTag: v1.0.0
  - name: kong
    newTag: 3.6.1
  - name: hashicorp/vault
    newTag: 1.15.6
  - name: prom/prometheus
    newTag: v2.51.0
  - name: grafana/grafana
    newTag: 10.4.18
