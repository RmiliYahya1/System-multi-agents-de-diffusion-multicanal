# ─────────────────────────────────────────────────────────────────
# NodePorts pour le dev local UNIQUEMENT (Docker Desktop, Minikube)
# En staging et prod, l'accès se fait via l'Ingress ALB (étape 8)
# kong-admin n'a intentionnellement PAS de NodePort, même en dev.
# Pour accéder à l'API admin en dev : kubectl port-forward svc/dev-kong-admin 8001:8001 -n dev-gateway
# ─────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: n8n-main-nodeport
spec:
  type: NodePort
  selector:
    app: n8n-main
  ports:
    - port: 5678
      targetPort: http      # containerPort nommé "http"
      nodePort: 30678       # http://localhost:30678
---
apiVersion: v1
kind: Service
metadata:
  name: grafana-nodeport
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: http      # containerPort nommé "http"
      nodePort: 30300       # http://localhost:30300
---
apiVersion: v1
kind: Service
metadata:
  name: queue-service-nodeport
spec:
  type: NodePort
  selector:
    app: queue-service
  ports:
    - port: 3002
      targetPort: http      # containerPort nommé "http"
      nodePort: 30302       # http://localhost:30302
---
apiVersion: v1
kind: Service
metadata:
  name: vault-nodeport
spec:
  type: NodePort
  selector:
    app: vault
  ports:
    - port: 8200
      targetPort: http      # containerPort nommé "http"
      nodePort: 30820       # http://localhost:30820
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-nodeport
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: http      # containerPort nommé "http"
      nodePort: 30909       # http://localhost:30909
---
# Accès au proxy Kong en dev (trafic webhook)
apiVersion: v1
kind: Service
metadata:
  name: kong-proxy-nodeport
  namespace: gateway
spec:
  type: NodePort
  selector:
    app: kong
  ports:
    - port: 80
      targetPort: proxy     # containerPort nommé "proxy" (8000)
      nodePort: 30800       # http://localhost:30800/webhook/
