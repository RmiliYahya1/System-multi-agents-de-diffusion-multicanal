apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: diffusion-dev

resources:
  - ../../base
  - patches/nodeports.yaml

patches:
  - path: patches/ingress-host-localhost.yaml
    target:
      kind: Ingress
      name: diffusion-ingress
  - path: patches/reduce-replicas.yaml
  - path: patches/reduce-resources.yaml

commonLabels:
  environment: dev

images:
  - name: diffusion-queue-service
    newTag: latest
