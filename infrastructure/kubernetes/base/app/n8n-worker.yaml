---
# Deployment n8n-worker (3 replicas réels + HPA)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-worker
  
spec:
  replicas: 3
  selector:
    matchLabels:
      app: n8n-worker
  template:
    metadata:
      labels:
        app: n8n-worker
    spec:
      containers:
        - name: n8n-worker
          image: n8nio/n8n:latest
          args: ["worker"]        # ← Différence clé avec n8n-main (args = CMD en K8s)
          envFrom:
            - configMapRef:
                name: n8n-config
          env:
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: POSTGRES_PASSWORD
            - name: QUEUE_BULL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: REDIS_PASSWORD
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: N8N_ENCRYPTION_KEY
          resources:
            limits:
              memory: 1.5Gi
              cpu: "1500m"
            requests:
              memory: 256Mi
              cpu: "250m"       # Requis pour que HPA calcule le %
---
# HPA — Auto-scale workers selon charge CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: n8n-worker-hpa
  
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: n8n-worker
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
