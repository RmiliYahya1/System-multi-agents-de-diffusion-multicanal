---
# Deployment n8n-main
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-main
  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n-main
  template:
    metadata:
      labels:
        app: n8n-main
    spec:
      containers:
        - name: n8n-main
          image: n8nio/n8n:latest
          envFrom:
            - configMapRef:
                name: n8n-config
          env:
            - name: WEBHOOK_URL
              value: "http://n8n-main:5678/"
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: POSTGRES_PASSWORD
            - name: QUEUE_BULL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: REDIS_PASSWORD
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: N8N_ENCRYPTION_KEY
          ports:
            - containerPort: 5678
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            limits:
              memory: 2Gi
              cpu: "2"
            requests:
              memory: 512Mi
              cpu: "500m"
---
# Service n8n-main
apiVersion: v1
kind: Service
metadata:
  name: n8n-main
  
spec:
  selector:
    app: n8n-main
  ports:
    - name: http
      port: 5678
      targetPort: 5678
