---
# Deployment n8n-main
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-main
  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n-main
  template:
    metadata:
      labels:
        app: n8n-main
    spec:
      containers:
        - name: n8n-main
          image: n8nio/n8n:latest
          env:
            - name: N8N_HOST
              value: "0.0.0.0"
            - name: N8N_PORT
              value: "5678"
            - name: WEBHOOK_URL
              value: "http://n8n-main:5678/"
            - name: GENERIC_TIMEZONE
              value: Africa/Casablanca
            - name: EXECUTIONS_MODE
              value: queue
            - name: QUEUE_HEALTH_CHECK_ACTIVE
              value: "true"
            - name: QUEUE_BULL_REDIS_HOST
              value: redis
            - name: QUEUE_BULL_REDIS_PORT
              value: "6379"
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: postgres
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: diffusion_db
            - name: DB_POSTGRESDB_USER
              value: diffusion_admin
            - name: N8N_RUNNERS_ENABLED
              value: "true"
            - name: N8N_CONCURRENCY_PRODUCTION_LIMIT
              value: "20"
            - name: N8N_PAYLOAD_SIZE_MAX
              value: "64"
            - name: EXECUTIONS_DATA_PRUNE
              value: "true"
            - name: EXECUTIONS_DATA_MAX_AGE
              value: "168"
            - name: QUEUE_BULL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: REDIS_PASSWORD
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: POSTGRES_PASSWORD
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: N8N_ENCRYPTION_KEY
          ports:
            - containerPort: 5678
              name: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            limits:
              memory: 2Gi
              cpu: "2"
            requests:
              memory: 512Mi
              cpu: "500m"
---
# Service n8n-main
apiVersion: v1
kind: Service
metadata:
  name: n8n-main
  
spec:
  selector:
    app: n8n-main
  ports:
    - name: http
      port: 5678
      targetPort: 5678
