---
# Deployment n8n-main
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-main
  labels:
    app.kubernetes.io/name: n8n-main
    app.kubernetes.io/instance: n8n-main
    app.kubernetes.io/version: "2.18.7"
    app.kubernetes.io/component: workflow-engine
    app.kubernetes.io/part-of: diffusion-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app: n8n-main
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: n8n-main
        app.kubernetes.io/name: n8n-main
        app.kubernetes.io/instance: n8n-main
        app.kubernetes.io/version: "2.18.7"
        app.kubernetes.io/component: workflow-engine
        app.kubernetes.io/part-of: diffusion-platform
        app.kubernetes.io/managed-by: kustomize
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5678"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: n8n-main
          image: n8nio/n8n:2.18.7
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: n8n-config
          env:
            - name: WEBHOOK_URL
              value: "http://n8n-main:5678/"
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: POSTGRES_PASSWORD
            - name: QUEUE_BULL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: REDIS_PASSWORD
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: N8N_ENCRYPTION_KEY
            - name: VAULT_ROOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: VAULT_TOKEN
          ports:
            - containerPort: 5678
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: n8n-home
              mountPath: /home/node/.n8n
            - name: n8n-cache
              mountPath: /home/node/.cache
            - name: tmp
              mountPath: /tmp
          startupProbe:
            httpGet:
              path: /healthz
              port: 5678
            # n8n peut être très lent au premier boot (init DB + migrations)
            failureThreshold: 60
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /healthz
              port: 5678
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            limits:
              memory: 2Gi
              cpu: "2"
            requests:
              memory: 512Mi
              cpu: "500m"
      volumes:
        - name: n8n-home
          emptyDir: {}
        - name: n8n-cache
          emptyDir: {}
        - name: tmp
          emptyDir: {}
---
# Service n8n-main
apiVersion: v1
kind: Service
metadata:
  name: n8n-main
  labels:
    app.kubernetes.io/name: n8n-main
    app.kubernetes.io/component: workflow-engine
    app.kubernetes.io/part-of: diffusion-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app: n8n-main
  ports:
    - name: http
      port: 5678
      targetPort: http
      protocol: TCP
      appProtocol: http
