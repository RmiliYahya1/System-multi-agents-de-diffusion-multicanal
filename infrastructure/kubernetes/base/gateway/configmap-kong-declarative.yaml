apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-declarative-config
data:
  kong.yml: |
    _format_version: "3.0"
    services:
      - name: n8n-service
        url: http://n8n-main:5678
        routes:
          - name: diffusion-webhook
            paths:
              - /webhook/
            strip_path: false
        plugins:
          - name: jwt
            config:
              claims_to_verify:
                - exp
    consumers:
      - username: client_demo_01
    jwt_secrets:
      - consumer: client_demo_01
        key: "emetteur_demo_01"
        secret: "${KONG_JWT_SECRET}"
        algorithm: HS256
