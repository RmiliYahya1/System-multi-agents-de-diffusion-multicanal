---
# Ingress — Point d'entrée unique
# /webhook/* → kong-proxy (port 80) → Kong → n8n (JWT auth)
# /*         → n8n-main (port 5678) → n8n UI directement
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: diffusion-ingress

  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  rules:
    - host: REPLACE_ME_OVERLAY
      http:
        paths:
          - path: /webhook/
            pathType: Prefix
            backend:
              service:
                name: kong-proxy
                port:
                  name: proxy         # mappe au port 80 du Service kong-proxy
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n-main
                port:
                  name: http          # mappe au port 5678 de l'ExternalName n8n-main
