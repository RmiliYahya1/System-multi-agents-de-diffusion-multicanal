---
# Ingress — Point d'entrée unique (remplace Nginx)
# Docker Desktop expose les NodePort directement
# L'ingress route vers les bons services
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: diffusion-ingress
  
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "64m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "120"
spec:
  rules:
    # n8n UI + webhooks (via Kong pour /webhook/)
    - host: REPLACE_ME_OVERLAY
      http:
        paths:
          - path: /webhook/
            pathType: Prefix
            backend:
              service:
                name: kong
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: n8n-main
                port:
                  number: 5678
