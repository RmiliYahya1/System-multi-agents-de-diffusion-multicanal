---
# Deployment Kong
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kong
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/instance: kong
    app.kubernetes.io/version: "3.6.1"
    app.kubernetes.io/component: gateway
    app.kubernetes.io/part-of: diffusion-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kong
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: kong
        app.kubernetes.io/name: kong
        app.kubernetes.io/instance: kong
        app.kubernetes.io/version: "3.6.1"
        app.kubernetes.io/component: gateway
        app.kubernetes.io/part-of: diffusion-platform
        app.kubernetes.io/managed-by: kustomize
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: substitute-secrets
          image: busybox:1.36
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 100
            capabilities:
              drop: [ALL]
          command:
            - sh
            - -c
            - |
              cp /input/kong.yml /output/kong.yml
              sed -i "s|\${KONG_JWT_SECRET}|$KONG_JWT_SECRET|g" /output/kong.yml
          env:
            - name: KONG_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: kong-secrets
                  key: KONG_JWT_SECRET
          volumeMounts:
            - name: kong-config-template
              mountPath: /input
            - name: kong-config-rendered
              mountPath: /output
      containers:
        - name: kong
          image: kong:3.6.1
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: kong-runtime-config
          ports:
            - containerPort: 8000
              name: proxy
            - containerPort: 8001
              name: admin
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: kong-config-rendered
              mountPath: /usr/local/kong/declarative
            - name: tmp
              mountPath: /tmp
            - name: kong-logs
              mountPath: /usr/local/kong/logs
          startupProbe:
            httpGet:
              path: /status
              port: 8001
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /status
              port: 8001
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /status
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            limits:
              memory: 1Gi
              cpu: "500m"
            requests:
              memory: 256Mi
              cpu: "100m"
      volumes:
        - name: kong-config-template
          configMap:
            name: kong-declarative-config
        - name: kong-config-rendered
          emptyDir: {}
        - name: tmp
          emptyDir: {}
        - name: kong-logs
          emptyDir: {}
---
# Service Kong
apiVersion: v1
kind: Service
metadata:
  name: kong

spec:
  selector:
    app: kong
  ports:
    - name: proxy
      port: 8000
      targetPort: 8000
    - name: admin
      port: 8001
      targetPort: 8001
