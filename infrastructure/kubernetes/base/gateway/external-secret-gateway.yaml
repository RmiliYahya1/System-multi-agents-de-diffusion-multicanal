apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: external-secret-gateway
  namespace: gateway
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: kong-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: KONG_JWT_SECRET
      remoteRef:
        key: diffusion/REPLACE_ENV/gateway
        property: KONG_JWT_SECRET
