apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init-config
  
data:
  001_init_schema.sql: |
    BEGIN;
    CREATE SCHEMA IF NOT EXISTS diffusion;
    SET timezone = 'Africa/Casablanca';

    CREATE TABLE diffusion.credentials (
        id                  BIGSERIAL     PRIMARY KEY,
        credential_ref      VARCHAR(50)   UNIQUE NOT NULL,
        client_id           BIGINT        NOT NULL,
        platform            VARCHAR(20)   NOT NULL CHECK (platform IN ('facebook', 'instagram', 'linkedin')),
        access_token        TEXT          NOT NULL,
        refresh_token       TEXT,
        client_app_id       VARCHAR(100),
        client_secret       TEXT,
        tenant_id           BIGINT        NOT NULL,
        expires_at          TIMESTAMPTZ,
        created_at          TIMESTAMPTZ   DEFAULT NOW(),
        updated_at          TIMESTAMPTZ   DEFAULT NOW(),
        CONSTRAINT uq_cred_client_platform UNIQUE (tenant_id, client_id, platform)
    );
    CREATE INDEX idx_cred_client ON diffusion.credentials (client_id);

    CREATE TABLE diffusion.channel_config (
        id                      SMALLSERIAL   PRIMARY KEY,
        config_id               VARCHAR(50)   UNIQUE NOT NULL,
        channel_name            VARCHAR(20)   NOT NULL CHECK (channel_name IN ('FACEBOOK', 'INSTAGRAM', 'LINKEDIN')),
        diffusion_type          VARCHAR(10)   NOT NULL CHECK (diffusion_type IN ('ORGANIC', 'PAID')),
        post_type               VARCHAR(20),
        text_max_chars          INTEGER,
        headline_max_chars      INTEGER,
        description_max_chars   INTEGER,
        hashtags_recommended    SMALLINT      DEFAULT 0,
        media_required          BOOLEAN       DEFAULT FALSE,
        native_scheduling       BOOLEAN       DEFAULT FALSE,
        tone_default            VARCHAR(50),
        typical_api_calls       SMALLINT      DEFAULT 1,
        tenant_id               BIGINT        NOT NULL,
        CONSTRAINT uq_config_channel_type UNIQUE (tenant_id, channel_name, diffusion_type)
    );

    CREATE TABLE diffusion.jobs (
        id                  BIGSERIAL     PRIMARY KEY,
        job_id              VARCHAR(50)   NOT NULL,
        request_id          VARCHAR(100)  NOT NULL,
        batch_id            VARCHAR(50)   NOT NULL,
        diffusion_id        BIGINT,
        source_agent        VARCHAR(20)   NOT NULL CHECK (source_agent IN ('AGENT_ADS', 'AGENT_MAILING', 'AGENT_COMMUNITY', 'IA_CRM')),
        tenant_id           BIGINT        NOT NULL,
        client_id           BIGINT        NOT NULL,
        campaign_id         BIGINT,
        channel_name        VARCHAR(20)   NOT NULL CHECK (channel_name IN ('FACEBOOK', 'INSTAGRAM', 'LINKEDIN')),
        credential_ref      VARCHAR(50)   NOT NULL,
        diffusion_type      VARCHAR(10)   NOT NULL CHECK (diffusion_type IN ('ORGANIC', 'PAID')),
        funnel_stage        VARCHAR(10)   CHECK (funnel_stage IN ('TOFU', 'MOFU', 'BOFU')),
        scheduled_at        TIMESTAMPTZ,
        timezone            VARCHAR(50)   DEFAULT 'Africa/Casablanca',
        budget_amount       NUMERIC(12,2),
        budget_currency     VARCHAR(5),
        payload             JSONB         NOT NULL DEFAULT '{}',
        status              VARCHAR(30)   NOT NULL DEFAULT 'RECEIVED' CHECK (status IN (
            'RECEIVED','SCHEDULED','REJECTED_SCHEMA','REJECTED_BUSINESS','DUPLICATE_IGNORED',
            'ADAPTING','ADAPTED','REJECTED_PAYLOAD','FAILED_LLM','FAILED_ADAPTATION',
            'PUBLISHING','PUBLISHED','FAILED_PRE_PUBLICATION','FAILED_CREDENTIALS',
            'FAILED_PUBLICATION','PUBLICATION_DEFERRED','ORCHESTRATION_ERROR')),
        retry_count         SMALLINT      DEFAULT 0,
        retry_max           SMALLINT      DEFAULT 3,
        platform_post_id    TEXT,
        last_error          JSONB,
        created_at          TIMESTAMPTZ   DEFAULT NOW(),
        updated_at          TIMESTAMPTZ   DEFAULT NOW(),
        CONSTRAINT uq_jobs_job_id UNIQUE (tenant_id, job_id),
        CONSTRAINT uq_jobs_request_channel UNIQUE (tenant_id, request_id, channel_name),
        CONSTRAINT chk_budget_paid CHECK ((diffusion_type = 'PAID' AND budget_amount IS NOT NULL) OR (diffusion_type = 'ORGANIC')),
        CONSTRAINT fk_jobs_credential FOREIGN KEY (credential_ref) REFERENCES diffusion.credentials(credential_ref) ON UPDATE CASCADE ON DELETE RESTRICT
    );
    CREATE INDEX idx_jobs_status ON diffusion.jobs (status);
    CREATE INDEX idx_jobs_batch_id ON diffusion.jobs (batch_id);
    CREATE INDEX idx_jobs_tenant_client_chan ON diffusion.jobs (tenant_id, client_id, channel_name);
    CREATE INDEX idx_jobs_created ON diffusion.jobs (created_at);

    CREATE TABLE diffusion.log_events (
        id                  BIGSERIAL,
        log_id              VARCHAR(50)   NOT NULL,
        job_id              VARCHAR(50),
        correlation_id      VARCHAR(50),
        agent               VARCHAR(30)   NOT NULL,
        event_type          VARCHAR(50)   NOT NULL,
        message             TEXT,
        tenant_id           BIGINT        NOT NULL,
        timestamp           TIMESTAMPTZ   NOT NULL DEFAULT NOW(),
        PRIMARY KEY (id, timestamp)
    ) PARTITION BY RANGE (timestamp);
    CREATE INDEX idx_logs_job_id      ON diffusion.log_events (job_id);
    CREATE INDEX idx_logs_correlation ON diffusion.log_events (correlation_id);
    CREATE INDEX idx_logs_timestamp   ON diffusion.log_events (timestamp);

    CREATE TABLE diffusion.log_events_2026_04 PARTITION OF diffusion.log_events FOR VALUES FROM ('2026-04-01') TO ('2026-05-01');
    CREATE TABLE diffusion.log_events_2026_05 PARTITION OF diffusion.log_events FOR VALUES FROM ('2026-05-01') TO ('2026-06-01');
    CREATE TABLE diffusion.log_events_2026_06 PARTITION OF diffusion.log_events FOR VALUES FROM ('2026-06-01') TO ('2026-07-01');
    CREATE TABLE diffusion.log_events_2026_07 PARTITION OF diffusion.log_events FOR VALUES FROM ('2026-07-01') TO ('2026-08-01');
    CREATE TABLE diffusion.log_events_2026_08 PARTITION OF diffusion.log_events FOR VALUES FROM ('2026-08-01') TO ('2026-09-01');
    CREATE TABLE diffusion.log_events_2026_09 PARTITION OF diffusion.log_events FOR VALUES FROM ('2026-09-01') TO ('2026-10-01');

    CREATE OR REPLACE FUNCTION diffusion.update_timestamp() RETURNS TRIGGER AS $$ BEGIN NEW.updated_at = NOW(); RETURN NEW; END; $$ LANGUAGE plpgsql;
    CREATE TRIGGER trg_jobs_updated BEFORE UPDATE ON diffusion.jobs FOR EACH ROW EXECUTE FUNCTION diffusion.update_timestamp();
    CREATE TRIGGER trg_credentials_updated BEFORE UPDATE ON diffusion.credentials FOR EACH ROW EXECUTE FUNCTION diffusion.update_timestamp();

    INSERT INTO diffusion.channel_config (config_id, channel_name, diffusion_type, post_type, text_max_chars, headline_max_chars, description_max_chars, hashtags_recommended, media_required, native_scheduling, tone_default, typical_api_calls, tenant_id) VALUES
        ('FACEBOOK_ORGANIC',  'FACEBOOK',  'ORGANIC', 'FEED',         63206, NULL, NULL, 3,  FALSE, TRUE,  'conversationnel', 1, 1),
        ('FACEBOOK_PAID',     'FACEBOOK',  'PAID',    'SINGLE_IMAGE', 63206, 40,   30,   0,  TRUE,  TRUE,  'persuasif',       4, 1),
        ('INSTAGRAM_ORGANIC', 'INSTAGRAM', 'ORGANIC', 'FEED',         2200,  NULL, NULL, 15, TRUE,  FALSE, 'visuel',          2, 1),
        ('INSTAGRAM_PAID',    'INSTAGRAM', 'PAID',    'STORY',        2200,  NULL, NULL, 5,  TRUE,  FALSE, 'accrocheur',      4, 1),
        ('LINKEDIN_ORGANIC',  'LINKEDIN',  'ORGANIC', 'DEFAULT',      3000,  NULL, NULL, 5,  FALSE, FALSE, 'professionnel',   2, 1),
        ('LINKEDIN_PAID',     'LINKEDIN',  'PAID',    'SINGLE_IMAGE', 600,   70,   200,  0,  TRUE,  TRUE,  'professionnel',   3, 1);

    COMMIT;
