---
# StatefulSet PostgreSQL
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/instance: postgres
    app.kubernetes.io/version: "16.6"
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: diffusion-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  serviceName: postgres
  replicas: 1
  updateStrategy:
    type: OnDelete
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/name: postgres
        app.kubernetes.io/instance: postgres
        app.kubernetes.io/version: "16.6"
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: diffusion-platform
        app.kubernetes.io/managed-by: kustomize
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9187"
        prometheus.io/path: "/metrics"
    spec:
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 70
        runAsGroup: 70
        fsGroup: 70
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:16.6-alpine
          imagePullPolicy: IfNotPresent
          args:
            - postgres
            - -c
            - max_connections=200
            - -c
            - shared_buffers=512MB
            - -c
            - work_mem=16MB
            - -c
            - effective_cache_size=1536MB
            - -c
            - maintenance_work_mem=256MB
            - -c
            - wal_level=replica
          envFrom:
            - configMapRef:
                name: postgres-config
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 5432
              name: postgres
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: tmp
              mountPath: /tmp
            - name: postgres-run
              mountPath: /var/run/postgresql
          startupProbe:
            exec:
              command: [pg_isready, -U, diffusion_admin, -d, diffusion_db]
            failureThreshold: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - diffusion_admin
                - -d
                - diffusion_db
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - diffusion_admin
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            limits:
              memory: 2Gi
              cpu: "2"
            requests:
              memory: 512Mi
              cpu: "250m"

        - name: postgres-exporter
          image: prometheuscommunity/postgres-exporter:v0.15.0
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 65534
            capabilities:
              drop: [ALL]
          env:
            - name: DATA_SOURCE_URI
              value: "localhost:5432/diffusion_db?sslmode=disable"
            - name: DATA_SOURCE_USER
              value: diffusion_admin
            - name: DATA_SOURCE_PASS
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: POSTGRES_PASSWORD
          ports:
            - containerPort: 9187
              name: metrics

      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-pvc
        - name: tmp
          emptyDir: {}
        - name: postgres-run
          emptyDir: {}
---
# Service PostgreSQL — Headless (résolution DNS pod-par-pod pour StatefulSet)
apiVersion: v1
kind: Service
metadata:
  name: postgres
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: diffusion-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  clusterIP: None   # Headless pour StatefulSet
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
      protocol: TCP
      appProtocol: postgresql
    - name: metrics
      port: 9187
      targetPort: metrics
      protocol: TCP
      appProtocol: http
