apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: external-secret-pgadmin
  namespace: data
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secrets-manager
    kind: ClusterSecretStore
  target:
    name: pgadmin-secrets
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
    - secretKey: PGADMIN_EMAIL
      remoteRef:
        key: diffusion/REPLACE_ENV/pgadmin
        property: PGADMIN_EMAIL
    - secretKey: PGADMIN_PASSWORD
      remoteRef:
        key: diffusion/REPLACE_ENV/pgadmin
        property: PGADMIN_PASSWORD
