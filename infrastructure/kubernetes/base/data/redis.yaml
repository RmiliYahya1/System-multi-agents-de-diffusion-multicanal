---
# StatefulSet Redis
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  
spec:
  serviceName: redis
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          command:
            - sh
            - -c
            - |
              redis-server \
                --maxmemory 1gb \
                --maxmemory-policy allkeys-lru \
                --appendonly yes \
                --save 60 1000 \
                --requirepass $(REDIS_PASSWORD)
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 6379
              name: redis
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a $REDIS_PASSWORD ping
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - redis-cli -a $REDIS_PASSWORD ping
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            limits:
              memory: 1.5Gi
            requests:
              memory: 256Mi
              
        - name: redis-exporter
          image: oliver006/redis_exporter:v1.58.0
          env:
            - name: REDIS_ADDR
              value: "redis://localhost:6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: REDIS_PASSWORD
          ports:
            - containerPort: 9121
              name: metrics
              
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-pvc
---
# Service Redis (ClusterIP externe / headless pour metrics)
apiVersion: v1
kind: Service
metadata:
  name: redis
  
spec:
  selector:
    app: redis
  ports:
    - port: 6379
      targetPort: 6379
      name: redis
    - port: 9121
      targetPort: 9121
      name: metrics
  clusterIP: None   # Headless pour StatefulSet
