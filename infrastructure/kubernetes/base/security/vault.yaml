---
# Deployment Vault (mode production avec PVC)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.15
          command: ["vault", "server", "-config=/vault/config/vault.hcl"]
          env:
            - name: VAULT_ADDR
              value: http://0.0.0.0:8200
            - name: VAULT_API_ADDR
              value: http://vault:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-secrets
                  key: VAULT_TOKEN
          ports:
            - containerPort: 8200
              name: http
          securityContext:
            capabilities:
              add:
                - IPC_LOCK
          volumeMounts:
            - name: vault-data
              mountPath: /vault/data
            - name: vault-config
              mountPath: /vault/config
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            limits:
              memory: 256Mi
              cpu: "500m"
            requests:
              memory: 64Mi
              cpu: "100m"
      volumes:
        - name: vault-data
          persistentVolumeClaim:
            claimName: vault-pvc
        - name: vault-config
          configMap:
            name: vault-config
---
# Service Vault
apiVersion: v1
kind: Service
metadata:
  name: vault
  
spec:
  selector:
    app: vault
  ports:
    - name: http
      port: 8200
      targetPort: 8200
