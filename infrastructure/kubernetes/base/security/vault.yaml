---
# Deployment Vault (mode production avec PVC)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/instance: vault
    app.kubernetes.io/version: "1.15.6"
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: diffusion-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
        app.kubernetes.io/name: vault
        app.kubernetes.io/instance: vault
        app.kubernetes.io/version: "1.15.6"
        app.kubernetes.io/component: security
        app.kubernetes.io/part-of: diffusion-platform
        app.kubernetes.io/managed-by: kustomize
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        runAsUser: 100
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: vault
          image: hashicorp/vault:1.15.6
          imagePullPolicy: IfNotPresent
          command: ["vault", "server", "-config=/vault/config/vault.hcl"]
          env:
            - name: VAULT_ADDR
              value: http://0.0.0.0:8200
            - name: VAULT_API_ADDR
              value: http://vault:8200
            - name: VAULT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vault-secrets
                  key: VAULT_TOKEN
          ports:
            - containerPort: 8200
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            # EXCEPTION : readOnlyRootFilesystem: false
            # Vault écrit dans /vault/data (stockage fichier) via son PVC.
            # Sans accès en écriture, vault server refuse de démarrer.
            readOnlyRootFilesystem: false
            capabilities:
              # EXCEPTION : IPC_LOCK requis pour mlock() — empêche le swap des secrets en mémoire
              add: [IPC_LOCK]
              drop: [ALL]
          volumeMounts:
            - name: vault-data
              mountPath: /vault/data
            - name: vault-config
              mountPath: /vault/config
          startupProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            failureThreshold: 30
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/sys/health?standbyok=true
              port: 8200
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/sys/health
              port: 8200
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            limits:
              memory: 512Mi
              cpu: "500m"
            requests:
              memory: 128Mi
              cpu: "100m"
      volumes:
        - name: vault-data
          persistentVolumeClaim:
            claimName: vault-pvc
        - name: vault-config
          configMap:
            name: vault-config
---
# Service Vault
apiVersion: v1
kind: Service
metadata:
  name: vault
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/component: security
    app.kubernetes.io/part-of: diffusion-platform
    app.kubernetes.io/managed-by: kustomize
spec:
  type: ClusterIP
  selector:
    app: vault
  ports:
    - name: http
      port: 8200
      targetPort: http
      protocol: TCP
      appProtocol: http
