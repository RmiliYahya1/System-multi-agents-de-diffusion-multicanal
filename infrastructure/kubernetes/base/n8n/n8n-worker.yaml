---
# Deployment n8n-worker (3 replicas réels + HPA)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: n8n-worker
  namespace: diffusion
spec:
  replicas: 3
  selector:
    matchLabels:
      app: n8n-worker
  template:
    metadata:
      labels:
        app: n8n-worker
    spec:
      containers:
        - name: n8n-worker
          image: n8nio/n8n:latest
          args: ["worker"]        # ← Différence clé avec n8n-main (args = CMD en K8s)
          env:
            - name: GENERIC_TIMEZONE
              value: Africa/Casablanca
            - name: EXECUTIONS_MODE
              value: queue
            - name: QUEUE_BULL_REDIS_HOST
              value: redis
            - name: QUEUE_BULL_REDIS_PORT
              value: "6379"
            - name: DB_TYPE
              value: postgresdb
            - name: DB_POSTGRESDB_HOST
              value: postgres
            - name: DB_POSTGRESDB_PORT
              value: "5432"
            - name: DB_POSTGRESDB_DATABASE
              value: diffusion_db
            - name: DB_POSTGRESDB_USER
              value: diffusion_admin
            - name: N8N_RUNNERS_ENABLED
              value: "true"
            - name: N8N_CONCURRENCY_PRODUCTION_LIMIT
              value: "10"
            - name: N8N_PAYLOAD_SIZE_MAX
              value: "64"
            - name: EXECUTIONS_DATA_PRUNE
              value: "true"
            - name: QUEUE_BULL_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: REDIS_PASSWORD
            - name: DB_POSTGRESDB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: POSTGRES_PASSWORD
            - name: N8N_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: diffusion-secrets
                  key: N8N_ENCRYPTION_KEY
          resources:
            limits:
              memory: 1.5Gi
              cpu: "1500m"
            requests:
              memory: 256Mi
              cpu: "250m"       # Requis pour que HPA calcule le %
---
# HPA — Auto-scale workers selon charge CPU
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: n8n-worker-hpa
  namespace: diffusion
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: n8n-worker
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
