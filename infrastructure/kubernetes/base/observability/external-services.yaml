---
# ExternalName alias : postgres-exporter (cross-namespace data → observability)
# Prometheus scrape le port metrics du StatefulSet postgres via cet alias.
apiVersion: v1
kind: Service
metadata:
  name: postgres-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: postgres-exporter
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: diffusion-platform
    app.kubernetes.io/managed-by: kustomize
  annotations:
    diffusion.platform/cross-namespace-alias: "true"
    diffusion.platform/target-namespace: "data"
spec:
  type: ExternalName
  externalName: postgres.data.svc.cluster.local
  ports:
    - name: metrics
      port: 9187
      protocol: TCP
      appProtocol: http
