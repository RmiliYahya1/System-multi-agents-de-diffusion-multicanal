events {
    worker_connections 1024;
}

http {
    # Zone de limitation par IP client (50 requêtes par seconde)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=50r/s;
    
    # Zone de limitation par tenant (si l'en-tête X-Tenant-ID est présent)
    limit_req_zone $http_x_tenant_id zone=tenant_limit:10m rate=20r/s;
    
    # Configuration sécurisée par défaut
    server_tokens off;
    
    server {
        listen 80;
        server_name localhost;
        
        # Route pour les webhooks n8n (Orchestrateur, etc.)
        location /webhook/ {
            # Application du Rate Limiting
            limit_req zone=api_limit burst=100 nodelay;
            limit_req zone=tenant_limit burst=30 delay=10;
            
            # Transfert de la requête vers ton URL n8n existante
            proxy_pass https://n8n.iaweb.dev/webhook/;
            proxy_ssl_server_name on;
            
            # Transmission des vraies adresses IP
            proxy_set_header Host n8n.iaweb.dev;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-ID $request_id;
            
            # Permettre des payloads un peu plus larges si nécessaire
            client_max_body_size 64M;
        }

        # Healthcheck endpoint
        location /health {
            access_log off;
            return 200 'OK';
            add_header Content-Type text/plain;
        }

        # Options pour l'interface UI de n8n si accès par le port 80 (Optionnel)
        location / {
            proxy_pass https://n8n.iaweb.dev/;
            proxy_ssl_server_name on;
            # Headers WebSockets n8n UI
            proxy_set_header Host n8n.iaweb.dev;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
        }
    }
}
